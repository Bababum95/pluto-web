name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  ORVAL_INPUT_TARGET: ${{ secrets.ORVAL_INPUT_TARGET }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure ORVAL_INPUT_TARGET configured
        run: test -n "$ORVAL_INPUT_TARGET"

      - name: Generate API client
        run: pnpm generate:api

      - name: Verify generated API is committed
        run: git diff --exit-code

      - name: Run lint
        run: pnpm lint

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure ORVAL_INPUT_TARGET configured
        run: test -n "$ORVAL_INPUT_TARGET"

      - name: Generate API client
        run: pnpm generate:api

      - name: Verify generated API is committed
        run: git diff --exit-code

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure ORVAL_INPUT_TARGET configured
        run: test -n "$ORVAL_INPUT_TARGET"

      - name: Generate API client
        run: pnpm generate:api

      - name: Verify generated API is committed
        run: git diff --exit-code

      - name: Build project
        run: pnpm build

  storybook:
    name: Build Storybook
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook

      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: storybook-static/
